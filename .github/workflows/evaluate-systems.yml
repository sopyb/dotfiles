name: Evaluate System Configs

on: [push, pull_request]

jobs:
  evaluate:
    strategy:
      matrix:
        include:
          - system: alphicta
          - system: bethium
          - system: zetalyeh
          - system: omegantes
      fail-fast: false
    runs-on: 'ubuntu-latest'
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: valuate ${{ matrix.system }} system configuration
        run: nix eval '.#nixosConfigurations.${{ matrix.system }}.config.system.build.toplevel' --json > /dev/null
